name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - refactor
  pull_request:
    branches:
      - main
      - refactor

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Announcements
        run: pnpm check:announcements

      - name: Check Doc Links (non-blocking)
        continue-on-error: true
        run: pnpm check:doc-links

      - name: Verify Environment Audit Helpers
        run: pnpm test:workspace-audit-scripts

      - name: Verify Frontend Regression
        run: pnpm test:frontend

      - name: Audit Web Lint (advisory)
        continue-on-error: true
        run: pnpm -C web run lint:check

      - name: Audit Workspace Permissions (advisory)
        continue-on-error: true
        run: pnpm audit:workspace-permissions

      - name: Verify Core Entry Syntax
        run: |
          node --check core/client.js
          node --check core/src/services/mysql-db.js
          node --check core/src/services/redis-cache.js
          node --check core/src/models/user-store.js

      - name: Lint Core (non-blocking)
        continue-on-error: true
        run: pnpm -C core exec eslint "src/**/*.js" "client.js"

  package:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Release
        run: pnpm package:release

      - name: List Artifacts
        run: ls -R core/dist

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: farm-win-x64
          path: ./core/dist/qq-farm-bot-win-x64.exe

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: farm-linux-x64
          path: ./core/dist/qq-farm-bot-linux-x64

      - name: Upload MacOS Intel
        uses: actions/upload-artifact@v4
        with:
          name: farm-mac-x64
          path: ./core/dist/qq-farm-bot-macos-x64

      - name: Upload MacOS Apple Silicon
        uses: actions/upload-artifact@v4
        with:
          name: farm-mac-arm64
          path: ./core/dist/qq-farm-bot-macos-arm64
